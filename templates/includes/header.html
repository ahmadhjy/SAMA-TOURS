{% load static i18n %}
<header class="site-header" id="site-header">
    <div class="container header-inner">
        <a href="{% url 'website:home' %}" class="logo" aria-label="{% trans 'Sama Tours — Home' %}">
            <img src="{% static 'media/logo.png' %}" alt="Sama Tours" class="logo-img" width="80" height="72">
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="{% trans 'Toggle navigation' %}" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <nav class="main-nav" id="main-nav">
            <ul>
                <li><a href="{% url 'website:home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>{% trans 'Home' %}</a></li>
                <li><a href="{% url 'website:about' %}" {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>{% trans 'About' %}</a></li>
                <li><a href="{% url 'website:packages' %}" {% if request.resolver_match.url_name == 'packages' %}class="active"{% endif %}>{% trans 'Packages' %}</a></li>
                <li><a href="{% url 'website:visa' %}" {% if request.resolver_match.url_name == 'visa' %}class="active"{% endif %}>{% trans 'Visa Requirements' %}</a></li>
                <li><a href="{% url 'website:contact' %}" class="nav-cta {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">{% trans 'Contact Us' %}</a></li>
            </ul>
            <div class="lang-switcher" aria-label="{% trans 'Language' %}">
                {% for lang in LANGUAGE_SWITCHER %}
                <a href="{{ lang.url }}" class="lang-switcher__link{% if lang.active %} is-active{% endif %}" hreflang="{{ lang.code }}" lang="{{ lang.code }}">{{ lang.code|upper }}</a>
                {% endfor %}
            </div>
        </nav>
    </div>
</header>
