{% load i18n %}
<article class="package-card package-card-tui">
    <a href="{% url 'website:package_detail' package.slug %}" class="package-card-image-link">
        <div class="package-card-image">
            {% if package.image_url %}
            <img src="{{ package.image_url }}" alt="{{ package.name }}" loading="lazy">
            {% else %}
            <div class="package-card-placeholder" aria-hidden="true"></div>
            {% endif %}
            <span class="package-price-badge">{{ package.price_display }}</span>
            <span class="package-destination">{{ package.destination_display }}</span>
        </div>
    </a>
    <div class="package-card-body">
        <h3><a href="{% url 'website:package_detail' package.slug %}">{{ package.name }}</a></h3>
        <div class="package-meta">
            <span class="package-duration">{{ package.duration }}</span>
        </div>
        <p>{{ package.short_description }}</p>
        <div class="package-card-actions">
            <a href="{% url 'website:package_detail' package.slug %}" class="btn btn-outline btn-sm">{% trans 'View details' %}</a>
            <a href="{{ package.whatsapp_booking_url }}" class="btn btn-primary btn-sm" target="_blank" rel="noopener noreferrer">
                {% trans 'Book Now' %}
            </a>
        </div>
    </div>
</article>
