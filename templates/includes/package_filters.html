{% load i18n %}
<div class="filters-card">
    <div class="filters-card-header">
        <svg class="filters-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <div>
            <p class="filters-card-title">{% trans 'Find your perfect trip' %}</p>
            <p class="filters-card-sub">{% trans 'Filter by country and budget' %}</p>
        </div>
    </div>
    <form class="package-filters" method="get" action="{{ filter_action|default:request.path }}">
        <div class="filter-field">
            <label for="filter-country">{% trans 'Country' %}</label>
            <div class="filter-input-wrap">
                <svg class="filter-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <select id="filter-country" name="country">
                    <option value="">{% trans 'All countries' %}</option>
                    {% for country in country_choices %}
                    <option value="{{ country }}" {% if current_country == country %}selected{% endif %}>{{ country }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="filter-field">
            <label for="filter-price">{% trans 'Budget' %}</label>
            <div class="filter-input-wrap">
                <svg class="filter-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <select id="filter-price" name="price_max">
                    {% for value, label in price_filter_options %}
                    <option value="{{ value }}" {% if current_price_max == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-filter-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                {% trans 'Search' %}
            </button>
            {% if filters_active %}
            <a href="{{ filter_action|default:request.path }}" class="btn btn-filter-clear">{% trans 'Clear' %}</a>
            {% endif %}
        </div>
    </form>
</div>
